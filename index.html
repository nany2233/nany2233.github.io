<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dany - Mi Página Web</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .contenedor{
            text-align:center;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            font-size:3rem;
            color:#333;
            margin-bottom:10px;
        }

        p{
            color:#666;
            font-size:1.2rem;
        }

        .boton{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#4facfe;
            color:white;
            text-decoration:none;
            border-radius:30px;
            transition:0.3s;
        }

        .boton:hover{
            background:#007bff;
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>¡Hola, soy Dany!</h1>
        <p>Bienvenido a mi página web personal.</p>
        <a href="#" class="boton">Conóceme</a>
    </div>

</body>
</html>
