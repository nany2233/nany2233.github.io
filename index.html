<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjetas de Habilidades</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#f4f6f9;
    padding:50px;
}

.habilidades{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    max-width:1200px;
    margin:auto;
}

.tarjeta{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 15px rgba(0,0,0,0.1);
    transition:all .3s ease;
}

.icono{
    font-size:50px;
    margin-bottom:15px;
}

.tarjeta h3{
    color:#0077ff;
    margin-bottom:10px;
}

.tarjeta p{
    color:#555;
    line-height:1.6;
}

.tarjeta:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 25px -5px rgba(0,0,0,0.15);
    background-color:#f8fafc;
    cursor:pointer;
}
</style>
</head>

<body>

<section class="habilidades">

    <div class="tarjeta">
        <div class="icono">💻</div>
        <h3>Desarrollo Web</h3>
        <p>
            Creación de sitios web modernos, rápidos y totalmente responsivos.
        </p>
    </div>

    <div class="tarjeta">
        <div class="icono">🎨</div>
        <h3>Diseño UI/UX</h3>
        <p>
            Diseño de interfaces atractivas y experiencias intuitivas.
        </p>
    </div>

    <div class="tarjeta">
        <div class="icono">🤖</div>
        <h3>Inteligencia Artificial</h3>
        <p>
            Integración de asistentes y modelos para automatización de código.
        </p>
    </div>

</section>

</body>
</html>
