<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjetas con Hover</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    margin: 0;
    padding: 40px;
}

.contenedor {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.tarjeta {
    width: 300px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    text-align: center;
}

.tarjeta:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 25px rgba(0,0,0,0.15);
    background-color: #f8fafc;
    cursor: pointer;
}

.tarjeta img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.contenido {
    padding: 20px;
}

h3 {
    color: #1e293b;
    margin-bottom: 10px;
}

p {
    color: #64748b;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="contenedor">

    <div class="tarjeta">
        <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800" alt="Inteligencia Artificial">
        <div class="contenido">
            <h3>Inteligencia Artificial</h3>
            <p>
                Integración de asistentes y modelos para automatización de código.
            </p>
        </div>
    </div>

    <div class="tarjeta">
        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800" alt="Desarrollo Web">
        <div class="contenido">
            <h3>Desarrollo Web</h3>
            <p>
                Creación de sitios modernos, rápidos y adaptados a cualquier dispositivo.
            </p>
        </div>
    </div>

    <div class="tarjeta">
        <img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=800" alt="Programación">
        <div class="contenido">
            <h3>Programación</h3>
            <p>
                Desarrollo de aplicaciones y soluciones tecnológicas personalizadas.
            </p>
        </div>
    </div>

</div>

</body>
</html>
